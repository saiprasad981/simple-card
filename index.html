<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titan Watch</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at top, rgba(138, 43, 226, 0.25), transparent 30%),
          linear-gradient(135deg, #0f172a, #1e293b 55%, #111827);
      }

      .premium-watch {
        width: min(100%, 380px);
        min-height: 620px;
        padding: 24px;
        border-radius: 18px;
        background: linear-gradient(180deg, #e5e5e5, #d5d4d4);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        display: grid;
        grid-template-rows: auto auto auto auto 1fr;
        gap: 0;
        overflow: hidden;
        transform: translateY(24px);
        opacity: 0;
        animation: card-in 0.8s ease forwards;
        transition: transform 0.35s ease, box-shadow 0.35s ease;
      }

      .premium-watch:hover {
        transform: translateY(-6px);
        box-shadow: 0 28px 60px rgba(0, 0, 0, 0.42);
      }

      .premium-watch img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border-radius: 14px;
        margin-bottom: 20px;
        transition: transform 0.45s ease, filter 0.45s ease;
      }

      .premium-watch:hover img {
        transform: scale(1.03);
        filter: saturate(1.08);
      }

      h1 {
        margin: 0 0 12px;
        color: #1a50a0;
        font-size: 1.9rem;
        line-height: 1.2;
        text-align: center;
        animation: fade-up 0.7s ease 0.15s both;
      }

      .description {
        margin: 0;
        color: #374151;
        font-size: 1rem;
        line-height: 1.6;
        text-align: center;
        animation: fade-up 0.7s ease 0.28s both;
      }

      .price {
        margin: 18px 0 0;
        color: #111827;
        font-size: 1.5rem;
        font-weight: 700;
        text-align: center;
        animation: fade-up 0.7s ease 0.4s both;
      }

      .button-row {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
        padding-top: 28px;
        animation: fade-up 0.7s ease 0.52s both;
      }

      button {
        flex: 1;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        transition:
          transform 0.25s ease,
          background-color 0.3s ease-in-out,
          box-shadow 0.3s ease;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.22);
      }

      .buy-now {
        background-color: #8a2be2;
      }

      .buy-now:hover {
        background-color: #0741ac;
      }

      .add-to-cart {
        background-color: #1a50a0;
      }

      .add-to-cart:hover {
        background-color: #0f3570;
      }

      @keyframes card-in {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .premium-watch {
          min-height: auto;
        }

        .button-row {
          flex-direction: column;
          align-items: stretch;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="premium-watch">
      <img
        src="https://www.titan.co.in/dw/image/v2/BKDD_PRD/on/demandware.static/-/Sites-titan-master-catalog/default/dwf2897f2b/images/Titan/Catalog/1805NM02_1.jpg?sw=600&sh=600"
        alt="Titan Black Metal Strap Watch"
      />
      <h1>Titan Black Metal Strap Watch</h1>
      <p class="description">
        A sleek premium watch with a bold black finish, refined dial, and a
        polished metal strap for a sharp everyday look.
      </p>
      <p class="price">Rs. 8,995</p>
      <div class="button-row">
        <button class="buy-now">BUY NOW</button>
        <button class="add-to-cart">ADD TO CART</button>
      </div>
    </div>
  </body>
</html>
